<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPulse · Portal Jurnal & Ujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .bg-surface-900 { background-color: #0b0f19; }
      .bg-surface-800 { background-color: #151b2c; }
    </style>
  </head>
  <body class="bg-surface-900 text-white min-h-screen p-6">
    
    <div class="max-w-4xl mx-auto">
      <h1 class="text-2xl font-bold mb-6">Dashboard EduPulse</h1>
      
      <div class="mb-10">
        <h2 class="text-lg font-semibold mb-4">Daftar Artikel</h2>
        <div id="articles-container" class="space-y-4">
          <p class="text-slate-500">Memuat data...</p>
        </div>
      </div>

      <div>
        <h2 class="text-lg font-semibold mb-4">Daftar Ujian</h2>
        <div id="exams-container" class="space-y-4">
          <p class="text-slate-500">Memuat data...</p>
        </div>
      </div>
    </div>

    <script>
      // 1. Fungsi Fetch Articles
      async function fetchArticles() {
        const container = document.getElementById("articles-container");
        try {
          const res = await fetch("/api/articles");
          const result = await res.json();
          
          // Memastikan data diambil dari result.data jika berbentuk objek
          const data = Array.isArray(result) ? result : (result.data || []);
          
          if (data.length === 0) {
            container.innerHTML = "<p>Belum ada artikel.</p>";
            return;
          }

          container.innerHTML = data.map(item => `
            <div class="bg-surface-800 p-4 rounded-lg border border-slate-700">
              <h3 class="font-bold">${item.title}</h3>
              <p class="text-sm text-slate-400">${item.content.substring(0, 100)}...</p>
            </div>
          `).join("");
        } catch (e) {
          container.innerHTML = "<p class='text-red-500'>Gagal memuat artikel.</p>";
        }
      }

      // 2. Fungsi Fetch Exams
      async function fetchExams() {
        const container = document.getElementById("exams-container");
        try {
          const res = await fetch("/api/exams");
          const result = await res.json();
          
          const data = Array.isArray(result) ? result : (result.data || []);
          
          if (data.length === 0) {
            container.innerHTML = "<p>Belum ada ujian.</p>";
            return;
          }

          container.innerHTML = data.map(item => `
            <div class="bg-surface-800 p-4 rounded-lg border border-slate-700">
              <h3 class="font-bold">${item.title}</h3>
              <p class="text-sm text-slate-400">Durasi: ${item.duration} menit</p>
            </div>
          `).join("");
        } catch (e) {
          container.innerHTML = "<p class='text-red-500'>Gagal memuat ujian.</p>";
        }
      }

      // 3. Inisialisasi
      window.onload = () => {
        fetchArticles();
        fetchExams();
      };
    </script>
  </body>
</html>
